<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="22" fill="#1DA5A0"/>
          <circle cx="24" cy="24" r="12" fill="#1E3A6E"/>
          <circle cx="24" cy="24" r="5" fill="#111"/>
          <circle cx="20" cy="20" r="3" fill="white" opacity="0.6"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-sistemas" style="color: #1E3A6E;">SISTEMAS</span>
        <span class="logo-integra" style="color: #1DA5A0;">INTEGRA</span>
        <span class="logo-tagline" style="color: #6B7280;">Tecnología · Seguridad · Control</span>
      </div>
    </div>

    <h2>Portal de Servicios</h2>
    <p class="subtitle">Inicia sesión en tu cuenta</p>

    <!-- Error -->
    <div class="error-box" *ngIf="error">{{ error }}</div>

    <!-- Correo -->
    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <span class="icon">✉</span>
        <input type="email" [(ngModel)]="email"
               placeholder="correo@ejemplo.com"
               (keyup.enter)="onLogin()"/>
      </div>
    </div>

    <!-- Contraseña -->
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="password"
               placeholder="••••••••"
               (keyup.enter)="onLogin()"/>
        <span class="toggle" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </span>
      </div>
    </div>

    <!-- Botón -->
    <button class="btn-primary" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
    </button>

    <div class="divider"></div>

    <a routerLink="/register" class="link-register">
      ¿No tienes cuenta? Regístrate
    </a>

  </div>
</div>
