<div class="login-page">
  <div class="login-card">

    <div class="logo-area">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="22" fill="#5BB8D4"/>
          <circle cx="24" cy="24" r="12" fill="#2A7EA8"/>
          <circle cx="24" cy="24" r="5" fill="#111"/>
          <circle cx="20" cy="20" r="3" fill="white" opacity="0.6"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-sistemas">SISTEMAS</span>
        <span class="logo-integra">INTEGRA</span>
      </div>
    </div>

    <h2>Crear cuenta</h2>
    <p class="subtitle">Completa tus datos para registrarte</p>

    <div class="error-box" *ngIf="error">{{ error }}</div>
    <div class="success-box" *ngIf="success">{{ success }}</div>

    <div class="field">
      <label>Nombre completo</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Tu nombre"/>
    </div>

    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="email" placeholder="correo@ejemplo.com"/>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="password" placeholder="Mínimo 6 caracteres"/>
        <span class="toggle" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </span>
      </div>
    </div>

    <div class="field">
      <label>Confirmar contraseña</label>
      <input [type]="showPassword ? 'text' : 'password'"
             [(ngModel)]="confirmPassword" placeholder="Repite tu contraseña"/>
    </div>

    <button class="btn-primary" (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
    </button>

    <div class="divider"></div>

    <a routerLink="/login" class="link-register">
      ¿Ya tienes cuenta? Inicia sesión
    </a>

  </div>
</div>
